  statement: 'PLUR visual identity: Profile pic is diagonal gradient sweep of 4 PLUR colors (x-pfp-grad-v1.svg). X banner
    is light dot field. Statement cards use final-v2 style as baseline. Website is dark-first but user prefers light and wants
    to "break up" pure black (future task). Scattered dots = logo in "forgotten" state, structured 3x3 grid = logo in "recalled"
    state (intentional metaphor). No watercolor, no 3D marble, no complex textures for cards - clean flat circles with life.
    Ghost 3x3 grid as subtle brand reference. Connecting lines in PLUR colors not gray. Cards alternate light (#f5f1ec) and
