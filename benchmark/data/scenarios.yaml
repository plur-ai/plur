# LongMemEval Benchmark Scenarios for PLUR
# 30 questions across 6 categories (5 each)
# Based on LongMemEval methodology — tests memory retrieval quality

- id: ss-user-1
  category: single_session_user
  conversations:
    - session: 1
      turns:
        - role: user
          content: "I just moved to Portland, Oregon from Austin. The rain is a big change."
        - role: assistant
          content: "Welcome to Portland! That's quite a climate shift from Austin's heat."
        - role: user
          content: "Yeah, I work as a data engineer at Nike now. Started last month."
  query: "Where does the user work?"
  expected_answer: "Nike"
  expected_keywords: ["Nike"]

- id: ss-user-2
  category: single_session_user
  conversations:
    - session: 1
      turns:
        - role: user
          content: "My daughter Emma just turned 7. We had a dinosaur-themed birthday party."
        - role: assistant
          content: "Happy birthday to Emma! Dinosaur parties are the best at that age."
  query: "How old is the user's daughter?"
  expected_answer: "7 years old"
  expected_keywords: ["7"]

