name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Principle of least privilege: workflow only needs to checkout and run tests.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      # Don't let one node's failure cancel the other — we want the full signal
      # from both Node versions, not a fail-fast cancellation (#311).
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: git config --global user.email "ci@plur.ai"
      - run: git config --global user.name "PLUR CI"
      - run: pnpm build
      # Spec JSON Schemas are generated from the Zod source of truth (#315).
      # Regenerate and fail if the committed spec/*.json drifted.
      - name: Check spec schemas are in sync with Zod
        run: |
          pnpm --filter @plur-ai/core gen:schemas
          git diff --exit-code spec/ || {
            echo "::error::spec/*.json is out of sync with the Zod schemas. Run 'pnpm --filter @plur-ai/core gen:schemas' and commit."
            exit 1
          }
      - run: pnpm test
