  statement: The PLUR benchmark suite lives permanently at benchmark/ in the PLUR monorepo root. run.ts is the LongMemEval
    harness (30 scenarios, 6 categories, hybrid/bm25/semantic modes). micro.ts is the per-operation latency micro-benchmark
    with LLM dedup testing via OpenRouter. Both runnable with `npx tsx benchmark/run.ts --label NAME` and comparable via `--compare
    a b`. Always run micro-benchmark before merging branches that touch the core API.
