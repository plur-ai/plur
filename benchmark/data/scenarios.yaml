- id: ss-asst-1
  category: single_session_assistant
  conversations:
    - session: 1
      turns:
        - role: user
          content: "Can you help me set up a Redis cache for my API?"
        - role: assistant
          content: "I'll set up Redis with a 5-minute TTL for API responses. Using ioredis as the client library since it has better cluster support than the default redis package."
  query: "What Redis client library did the assistant recommend?"
  expected_answer: "ioredis"
  expected_keywords: ["ioredis"]

- id: ss-asst-2
  category: single_session_assistant
  conversations:
    - session: 1
      turns:
        - role: user
          content: "Help me pick a testing framework for my Node project."
        - role: assistant
          content: "I recommend Vitest over Jest. It's faster, has native ESM support, and the API is nearly identical so migration is easy. The watch mode is particularly good."
  query: "What testing framework did the assistant recommend?"
  expected_answer: "Vitest"
  expected_keywords: ["Vitest"]

- id: ss-asst-3
  category: single_session_assistant
  conversations:
    - session: 1
      turns:
        - role: user
          content: "I'm getting CORS errors in my Express app."
        - role: assistant
          content: "The fix was adding the cors middleware before your routes, not after. The order matters because Express processes middleware sequentially. I also set the origin to your frontend URL instead of using wildcard."
  query: "What was the fix for the CORS errors?"
  expected_answer: "Add cors middleware before routes, set specific origin"
  expected_keywords: ["before", "routes"]

- id: ss-asst-4
  category: single_session_assistant
  conversations:
    - session: 1
      turns:
        - role: user
          content: "My Docker build is taking 15 minutes."
        - role: assistant
          content: "I restructured the Dockerfile to use multi-stage builds. The key optimization was separating the dependency install layer from the source code copy. Now npm install only re-runs when package.json changes. Build time dropped to 2 minutes."
  query: "How much did the Docker build time improve?"
  expected_answer: "From 15 minutes to 2 minutes"
  expected_keywords: ["2 minutes"]

- id: ss-asst-5
  category: single_session_assistant
  conversations:
    - session: 1
      turns:
        - role: user
          content: "What's the best way to handle environment variables in Next.js?"
        - role: assistant
          content: "Use NEXT_PUBLIC_ prefix for client-side variables. Server-only secrets go in .env.local without the prefix. I created a src/env.ts validation file using zod to catch missing variables at build time."
  query: "What tool did the assistant use to validate environment variables?"
  expected_answer: "Zod, in src/env.ts"
  expected_keywords: ["zod"]

- id: temp-1
  category: temporal_reasoning
  conversations:
    - session: 1
      turns:
        - role: user
          content: "On Monday I deployed version 2.1 to staging."
        - role: assistant
          content: "Noted — v2.1 deployed to staging on Monday."
    - session: 2
      turns:
        - role: user
          content: "On Wednesday we found a critical bug in v2.1, so I rolled back to v2.0."
  query: "What happened after the v2.1 deployment?"
  expected_answer: "A critical bug was found on Wednesday, leading to a rollback to v2.0"
  expected_keywords: ["bug", "rollback", "2.0"]

- id: temp-2
  category: temporal_reasoning
  conversations:
    - session: 1
      turns:
        - role: user
          content: "In January we migrated from MongoDB to PostgreSQL."
    - session: 2
      turns:
        - role: user
          content: "In March we added read replicas to handle the traffic spike."
  query: "What database changes happened and in what order?"
  expected_answer: "January: migrated from MongoDB to PostgreSQL. March: added read replicas."
  expected_keywords: ["MongoDB", "PostgreSQL", "replicas"]

