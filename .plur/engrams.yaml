  statement: 'PLUR language guidelines: Use "local-first" for developer audiences (they know the term), use "runs on your
    machine" or "no cloud" for general audiences. Use "open format" not "open standard" (standard is presumptuous for a new
    product - formats become standards through adoption). Use "For good." not "Permanently." Use "Every correction makes it
    sharper" not "gets smarter through feedback" (feedback sounds like work). Drop "not just bigger" (vague). Replace algorithm
    name-dropping (RRF, BGE, BM25) with "local search, no API calls" in non-technical contexts.'
