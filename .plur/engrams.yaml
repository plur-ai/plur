  scope: project:plur
  statement: 'PLUR strategic repositioning (April 2026): Don''t compete on memory storage (commoditizing — native in Claude,
    ChatGPT, etc.). Compete on the exchange where knowledge has measurable economic value. Knowledge packs are the unit of
    value, curation/quality is the moat. Critical validation before building exchange: prove the Pack ROI Loop — that buying
    a pack is cheaper than burning API calls (pack_value = cost_without - cost_with - pack_price). If positive, exchange has
    viable unit economics. Roadmap after proof: agent wallets + budgets → demand signaling → autonomous buying/selling → expansion
    to other data types.'
  status: active
