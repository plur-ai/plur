  statement: 'Competitive learning workflow for PLUR/Datacore: 5 phases — Discover (GitHub trending, X threads, HN, papers)
    → Study (parallel agents research repos exhaustively) → Record (full learnings doc + landscape update + CRM entries +
    industry YAML + engram) → Absorb (weekly review integration, pattern adoption before building, nightshift deep dives)
    → Track (quarterly re-check). Anti-pattern: never cherry-pick to "top N" — record ALL ideas, filter at absorption time.
    Files: reference/competitive-learnings-*.md (per-batch), reference/competitive-landscape.md (master), contacts/projects/*.md
    (CRM), industry-landscape.yaml (industry). Workflow page: 2-datacore/3-knowledge/pages/competitive-learning-workflow.md'
