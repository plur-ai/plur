- id: ms-1
  category: multi_session_reasoning
  conversations:
    - session: 1
      turns:
        - role: user
          content: "For our microservices, we use Python for the data pipeline service."
    - session: 2
      turns:
        - role: user
          content: "The authentication service is written in Go for performance."
    - session: 3
      turns:
        - role: user
          content: "Our frontend BFF is a Node.js service that aggregates the others."
  query: "What languages are used across the microservices?"
  expected_answer: "Python (data pipeline), Go (authentication), Node.js (frontend BFF)"
  expected_keywords: ["Python", "Go", "Node"]

