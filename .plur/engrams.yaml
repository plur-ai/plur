  statement: 'Enterprise prospect (developer company) interested in PLUR: 1400 repos, 300 GitLab groups, 50 employees, multi-model
    users, mostly VS Code. Need centralized MCP (HTTP/SSE), PostgreSQL backend, GitLab OAuth + permission enforcement, admin
    dashboard. Key gaps: no HTTP transport, no auth, no multi-tenant enforcement, no GitLab integration. Estimated 14-20 weeks
    total build. Recommended approach: EUR 5K pilot (3 months, 10 users) then EUR 40/user/month at scale.'
